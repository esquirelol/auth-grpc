services:
  db:
    image: postgres:17-bookworm
    container_name: database
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql

  application:
    build: .
    container_name: application
    ports:
      - "9091:9091"

    depends_on:
      db:
        condition: service_healthy
    environment:
      CONFIG_PATH: ${CONFIG_PATH}
      STORAGE_PATH: "postgres://${DB_USER}:${DB_PASS}@db/${DB_NAME}?sslmode=disable"
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}


volumes:
  db-data: